title: "AIコーディングを始めるためのGit — 非エンジニアが最短で「動かせる」ようになる本"
summary: |
  Claude Code、Codex、Google Antigravity、GitHub Copilot ── AIにコードを書いてもらう時代が来た。
  でもこれらのツールは全部「Git」が前提で動く。
  「AIに書いてもらいたいだけなのに、Gitがわからなくて詰む」── その壁を取り除く本。
  プログラミング経験ゼロでも、VS Codeの画面操作だけでGitを使いこなし、
  最後はClaude Codeで実際にアプリを作るところまで到達する。
