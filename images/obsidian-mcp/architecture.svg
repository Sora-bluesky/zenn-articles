<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Noto Sans CJK JP', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0d0e1a"/>
    </linearGradient>
    <linearGradient id="claudeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="obsidianGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bgGrad)" rx="16"/>

  <!-- Claude Code Box -->
  <rect x="40" y="30" width="720" height="300" rx="12" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="60" y="58" fill="#f59e0b" font-size="16" font-weight="bold">Claude Code</text>

  <!-- 4 vendor boxes -->
  <rect x="60" y="80" width="150" height="60" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="135" y="108" fill="#60a5fa" font-size="14" font-weight="bold" text-anchor="middle">OpenAI</text>
  <text x="135" y="126" fill="#94a3b8" font-size="11" text-anchor="middle">9ソース</text>

  <rect x="230" y="80" width="150" height="60" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="305" y="108" fill="#34d399" font-size="14" font-weight="bold" text-anchor="middle">Google</text>
  <text x="305" y="126" fill="#94a3b8" font-size="11" text-anchor="middle">13ソース</text>

  <rect x="400" y="80" width="150" height="60" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="475" y="108" fill="#fb923c" font-size="14" font-weight="bold" text-anchor="middle">Anthropic</text>
  <text x="475" y="126" fill="#94a3b8" font-size="11" text-anchor="middle">12ソース</text>

  <rect x="570" y="80" width="150" height="60" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="645" y="108" fill="#38bdf8" font-size="14" font-weight="bold" text-anchor="middle">WordPress</text>
  <text x="645" y="126" fill="#94a3b8" font-size="11" text-anchor="middle">5ソース</text>

  <!-- Arrows from vendors to dedup -->
  <line x1="135" y1="140" x2="390" y2="175" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="305" y1="140" x2="390" y2="175" stroke="#475569" stroke-width="1.5"/>
  <line x1="475" y1="140" x2="410" y2="175" stroke="#475569" stroke-width="1.5"/>
  <line x1="645" y1="140" x2="410" y2="175" stroke="#475569" stroke-width="1.5"/>

  <!-- Dedup Engine -->
  <rect x="300" y="170" width="200" height="50" rx="8" fill="#1e293b" stroke="#e879f9" stroke-width="1.5"/>
  <text x="400" y="200" fill="#e879f9" font-size="13" font-weight="bold" text-anchor="middle">重複排除エンジン</text>

  <!-- Arrow to summary -->
  <line x1="400" y1="220" x2="400" y2="240" stroke="#475569" stroke-width="1.5"/>

  <!-- Summary Generator -->
  <rect x="300" y="240" width="200" height="50" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="400" y="270" fill="#fbbf24" font-size="13" font-weight="bold" text-anchor="middle">日本語要約生成</text>

  <!-- MCP Arrow -->
  <line x1="400" y1="330" x2="400" y2="370" stroke="#a78bfa" stroke-width="3" filter="url(#glow)"/>
  <rect x="370" y="340" width="60" height="24" rx="4" fill="#7c3aed"/>
  <text x="400" y="356" fill="white" font-size="12" font-weight="bold" text-anchor="middle">MCP</text>

  <!-- Obsidian Box -->
  <rect x="200" y="380" width="400" height="120" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="400" y="410" fill="#a78bfa" font-size="16" font-weight="bold" text-anchor="middle">Obsidian</text>

  <!-- Folder structure -->
  <text x="260" y="440" fill="#94a3b8" font-size="13">AI-News/</text>
  <text x="300" y="460" fill="#60a5fa" font-size="12">├ OpenAI/</text>
  <text x="300" y="478" fill="#34d399" font-size="12">├ Google/</text>
  <text x="440" y="460" fill="#fb923c" font-size="12">├ Anthropic/</text>
  <text x="440" y="478" fill="#38bdf8" font-size="12">└ WordPress/</text>

  <!-- 3-layer labels on right -->
  <rect x="620" y="390" width="140" height="100" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="690" y="412" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">3層フェッチ</text>
  <text x="690" y="434" fill="#60a5fa" font-size="11" text-anchor="middle">L1: 直接取得 (35)</text>
  <text x="690" y="454" fill="#fbbf24" font-size="11" text-anchor="middle">L2: Web検索 (1)</text>
  <text x="690" y="474" fill="#e879f9" font-size="11" text-anchor="middle">L3: ブラウザ (3)</text>
</svg>
